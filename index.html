<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaberOS — Saber Zou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500&family=PT+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="liquidGL.js" defer></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFF8F0;
  --fg: #2D1B00;
  --fg-muted: #7A5C3A;
  
  /* Color Palette */
  --tea-green: #AACC96;
  --forest: #FF8C42;
  --peach-frost: #F4BEAE;
  --blueberry: #52A5CE;
  --bubblegum: #FF7BAC;
  --dry-earth: #876029;
  --grape-juice: #6D1F42;
  --lilacs: #D3B6D3;
  --butter-yellow: #EFCE7B;
  --iced-blue: #B8CEE8;
  --blood-orange: #EF6F3C;
  --olive-green: #AFAB23;
  
  --sans: 'Bricolage Grotesque', -apple-system, sans-serif;
  --serif: 'PT Serif', Georgia, serif;
  
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  
  /* Traffic lights */
  --traffic-red: #FF5F56;
  --traffic-yellow: #FFBD2E;
  --traffic-green: #27C93F;
}

html { font-size: 16px; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--fg);
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Boot Animation ─── */
.boot-screen {
  position: fixed;
  inset: 0;
  background: #3A2200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s var(--ease-out-quart);
}

.boot-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}

.boot-logo {
  font-size: 3rem;
  font-weight: 500;
  color: white;
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

.boot-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── Menu Bar ─── */
.menu-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 28px;
  background: transparent;
  border-bottom: 1px solid rgba(255,255,255,0.35);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
  font-size: 0.75rem;
  font-weight: 500;
  color: #2D1B00;
}

.menu-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.menu-logo {
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  padding: 0;
  transition: opacity 0.2s;
}

.menu-logo:hover {
  opacity: 0.7;
}

.menu-item {
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 4px;
  transition: background 0.2s;
}

.menu-item:hover {
  background: rgba(45,27,0,0.08);
}

.menu-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.menu-icon {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0.9;
}

.menu-clock {
  min-width: 60px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.menu-username {
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
}

.menu-username:hover {
  background: rgba(45,27,0,0.08);
}

/* ─── Desktop Wallpaper ─── */
.desktop {
  position: fixed;
  inset: 28px 0 0 0;
  background: var(--bg) url('wallpaper-fluted.jpg') center/cover no-repeat;
  z-index: 1;
  overflow: hidden;
}

@keyframes wallpaperShift {
  0%, 100% { background-position: 0% 0%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
}

/* ─── Weather Widget ─── */
.weather-widget {
  position: absolute;
  top: 20px;
  left: 30px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  z-index: 5;
  cursor: default;
  user-select: none;
  transition: transform 0.2s ease;
}
.weather-widget:hover { transform: scale(1.02); }
.weather-icon { font-size: 2.2rem; line-height: 1; }
.weather-temp { font-size: 1.5rem; font-weight: 500; color: var(--fg); line-height: 1.2; }
.weather-desc { font-size: 0.75rem; color: var(--fg-muted); }
.weather-location { font-size: 0.65rem; color: var(--fg); opacity: 0.6; }

/* ─── Todo Widget ─── */
.todo-widget {
  position: absolute;
  top: 110px;
  left: 30px;
  width: 220px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  z-index: 5;
  cursor: default;
  user-select: none;
}
.todo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.todo-title {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--fg);
}
.todo-add-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(255,140,66,0.3);
  color: var(--fg);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.todo-add-btn:hover { background: rgba(255,140,66,0.5); }
.todo-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: var(--fg);
}
.todo-item.done .todo-text { text-decoration: line-through; opacity: 0.5; }
.todo-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--fg-muted);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: transparent;
}
.todo-item.done .todo-check {
  background: rgba(255,140,66,0.4);
  border-color: rgba(255,140,66,0.6);
  color: var(--fg);
}
.todo-text { flex: 1; }
.todo-remove {
  opacity: 0;
  border: none;
  background: none;
  color: var(--fg-muted);
  cursor: pointer;
  font-size: 0.7rem;
  transition: opacity 0.15s;
}
.todo-item:hover .todo-remove { opacity: 0.7; }
.todo-input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: var(--fg);
  font-size: 0.75rem;
  font-family: inherit;
  outline: none;
  margin-top: 6px;
}
.todo-input::placeholder { color: var(--fg-muted); opacity: 0.6; }
.todo-input-row { display: none; }
.todo-input-row.visible { display: block; }

/* ─── Desktop Icons ─── */
.desktop-icons {
  position: absolute;
  top: 20px;
  right: 40px;
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 24px 16px;
  z-index: 10;
}

.desktop-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: background 0.15s;
  user-select: none;
}

.desktop-icon:hover {
  background: rgba(45, 27, 0, 0.18);
}

.desktop-icon:active {
  transform: scale(0.95);
}

.desktop-icon.selected {
  background: rgba(45, 27, 0, 0.15);
}

.desktop-icon.selected .desktop-icon-label {
  background: #FF8C42;
  color: white;
}

.desktop-icon-img {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.desktop-icon-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.desktop-icon-label {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--fg);
  text-align: center;
  max-width: 90px;
  padding: 2px 6px;
  border-radius: 4px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7), 0 0 8px rgba(0,0,0,0.4);
  color: #fff;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── Context Menu ─── */
.context-menu {
  position: fixed;
  background: rgba(245, 240, 235, 0.95);
  backdrop-filter: blur(20px);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(45, 27, 0, 0.15);
  padding: 8px 0;
  min-width: 180px;
  z-index: 5000;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.95);
  transition: opacity 0.15s, transform 0.15s;
}

.context-menu.active {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

.context-item {
  padding: 8px 16px;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}

.context-item:hover {
  background: rgba(45, 27, 0, 0.08);
}

.context-separator {
  height: 1px;
  background: rgba(45, 27, 0, 0.1);
  margin: 6px 0;
}

/* ─── Windows ─── */
.window {
  position: absolute;
  min-width: 360px;
  min-height: 240px;
  max-width: 90vw;
  max-height: 80vh;
  background: var(--bg);
  border-radius: 10px;
  box-shadow: 
    0 4px 24px rgba(45, 27, 0, 0.12),
    0 16px 48px rgba(45, 27, 0, 0.08);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
  z-index: 100;
  overflow: hidden;
}

.window.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

.window-header {
  height: 40px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.3);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
}

.window-header:active {
  cursor: grabbing;
}

.window-controls {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.window-btn {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  transition: all 0.15s;
  position: relative;
}

.window-btn:hover {
  filter: brightness(0.9);
}

.window-btn::before {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  opacity: 0;
  transition: opacity 0.15s;
}

.window-btn.close { background: var(--traffic-red); }
.window-btn.minimize { background: var(--traffic-yellow); }
.window-btn.maximize { background: var(--traffic-green); }

.window-btn.close::before {
  content: '×';
  color: rgba(0,0,0,0.5);
  font-size: 9px;
  line-height: 1;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
}

.window-btn:hover::before {
  opacity: 1;
}

.window-title {
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 500;
  color: #2D1B00;
  flex: 1;
  text-align: center;
  letter-spacing: 0.02em;
  margin-right: 52px;
}

.window-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.window-content img {
  width: 100%;
  height: auto;
  border-radius: 6px;
  margin-bottom: 20px;
}

.window-content h2 {
  font-family: var(--sans);
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--fg);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.window-content h3 {
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--fg);
  margin: 20px 0 8px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.window-content p {
  font-family: var(--serif);
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--fg-muted);
  margin-bottom: 12px;
}

.window-content a {
  color: var(--forest);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.window-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg);
  background: transparent;
  border: 1px solid #FF8C42;
  padding: 10px 20px;
  border-radius: 100px;
  text-decoration: none;
  margin-top: 8px;
  transition: all 0.2s var(--ease-out-quart);
}

.window-link:hover {
  background: #FF8C42;
  color: white;
}

.window-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(45, 27, 0, 0.1);
}

.window-tags span {
  font-family: var(--sans);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-muted);
  padding: 4px 12px;
  background: rgba(45, 27, 0, 0.06);
  border-radius: 100px;
}

/* ─── Dock ─── */
.dock {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: transparent;
  padding: 10px 16px;
  border-radius: 24px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  z-index: 200;
}

.dock-separator {
  width: 1px;
  height: 44px;
  background: rgba(255, 255, 255, 0.15);
  margin: 0 6px;
}

.dock-item {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.2s var(--ease-out-quart);
  flex-shrink: 0;
}

.dock-item:hover {
  background: rgba(255, 255, 255, 0.18);
  transform: scale(1.15) translateY(-8px);
}

.dock-item img {
  width: 36px;
  height: 36px;
  object-fit: contain;
  pointer-events: none;
  border-radius: 8px;
}

.dock-tooltip {
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(45,27,0,0.85);
  backdrop-filter: blur(8px);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s var(--ease-out-quart);
}

.dock-item:hover .dock-tooltip {
  opacity: 1;
}

.dock-indicator {
  position: absolute;
  bottom: 4px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  opacity: 0;
  transition: opacity 0.2s;
}

.dock-item.active .dock-indicator {
  opacity: 1;
}

/* ─── Notification Toast ─── */
.notification {
  position: fixed;
  top: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: rgba(45, 27, 0, 0.95);
  backdrop-filter: blur(12px);
  color: white;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  z-index: 6000;
  opacity: 0;
  transition: all 0.4s var(--ease-out-quart);
}

.notification.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ─── Tablet Layout ─── */
@media (min-width: 768px) and (max-width: 1023px) {
  .desktop-icons {
    display: none;
  }
  
  .launchpad {
    display: grid !important;
  }
  
  .dock {
    bottom: 12px;
    padding: 8px 12px;
  }
  
  .dock-item {
    width: 48px;
    height: 48px;
  }
  
  .dock-item img {
    width: 30px;
    height: 30px;
  }
  
  .window {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: 90vw !important;
    max-width: 600px;
    max-height: 75vh;
  }
}

/* ─── Mobile Layout ─── */
@media (max-width: 767px) {
  .weather-widget { display: none; }
  .todo-widget { display: none; }
  .menu-bar {
    height: 48px;
    padding: 0 16px;
  }
  
  .menu-bar .menu-item:not(.menu-logo),
  .menu-bar .menu-icon,
  .menu-clock {
    display: none;
  }
  
  .menu-hamburger {
    display: flex !important;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 8px;
  }
  
  .menu-hamburger span {
    width: 18px;
    height: 2px;
    background: #2D1B00;
    border-radius: 1px;
  }
  
  .dock {
    display: none;
  }
  
  .desktop-icons {
    display: none;
  }
  
  .desktop {
    inset: 48px 0 0 0;
  }
  
  .mobile-home {
    display: block !important;
  }
  
  .window {
    display: none !important;
  }
}

.menu-hamburger {
  display: none;
}

/* ─── Launchpad (Tablet) ─── */
.launchpad {
  display: none;
  position: absolute;
  inset: 40px;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  padding: 40px;
  place-items: center;
  overflow-y: auto;
}

.launchpad-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.launchpad-icon-img {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(45, 27, 0, 0.15);
}

.launchpad-icon-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
}

.launchpad-icon span {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--fg);
  text-align: center;
}

/* ─── Mobile Home Screen ─── */
.mobile-home {
  display: none;
  position: absolute;
  inset: 0;
  padding: 24px 20px;
  overflow-y: auto;
}

.mobile-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px 12px;
  padding-bottom: 40px;
}

.mobile-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px;
  border-radius: 12px;
  min-height: 88px;
}

.mobile-icon:active {
  transform: scale(0.95);
}

.mobile-icon-img {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(45, 27, 0, 0.12);
}

.mobile-icon-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

.mobile-icon span {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--fg);
  text-align: center;
  max-width: 64px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── Mobile Sheet ─── */
.mobile-sheet {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 400;

// ─── Window Management ───
const windows = new Map();
let zIndexCounter = 100;
let minimizedWindows = new Set();

function createWindow(id, data, options) {
  options = options || {};
  const isSystemApp = options.isSystemApp || false;
  
  if (minimizedWindows.has(id)) {
    const win = windows.get(id);
    if (win) {
      win.element.style.display = 'flex';
      gsap.to(win.element, { opacity: 1, scale: 1, duration: 0.3 });
      minimizedWindows.delete(id);
      focusWindow(id);
      return;
    }
  }
  
  if (windows.has(id) && !minimizedWindows.has(id)) {
    focusWindow(id);
    return;
  }

  const windowEl = document.createElement('div');
  windowEl.className = 'window active';
  windowEl.id = 'window-' + id;
  windowEl.style.zIndex = ++zIndexCounter;
  
  const baseX = 60 + (windows.size * 30) % 200;
  const baseY = 50 + (windows.size * 20) % 150;
  windowEl.style.left = baseX + 'px';
  windowEl.style.top = baseY + 'px';
  windowEl.style.width = options.width || (isSystemApp ? '480px' : '800px');
  windowEl.style.height = isSystemApp ? '' : '600px';
  
  const headerColor = data.accent || '#FF8C42';
  
  let contentHTML = '';
  
  if (isSystemApp) {
    contentHTML = renderSystemApp(id);
  } else {
    contentHTML = '<iframe src="' + data.link + '" style="width:100%;height:100%;border:none;flex:1;"></iframe>';
  }
  
  windowEl.innerHTML = 
    '<div class="window-header" style="background: rgba(255,255,255,0.35); backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%); border-bottom: 1px solid rgba(255,255,255,0.3); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5); background-image: linear-gradient(to right, ' + headerColor + '18, transparent);">' +
      '<div class="window-controls">' +
        '<button class="window-btn close" onclick="closeWindow(\'' + id + '\')" title="Close"></button>' +
        '<button class="window-btn minimize" onclick="minimizeWindow(\'' + id + '\')" title="Minimize"></button>' +
        '<button class="window-btn maximize" onclick="maximizeWindow(\'' + id + '\')" title="Maximize"></button>' +
      '</div>' +
      '<span class="window-title">' + data.title + '</span>' +
    '</div>' +
    '<div class="window-content ' + (id === 'about' ? 'about-mac' : '') + '">' +
      contentHTML +
    '</div>';
  
  document.getElementById('desktop').appendChild(windowEl);
  
  windows.set(id, {
    element: windowEl,
    data: data,
    isOpen: true,
    isMaximized: false,
    originalRect: null
  });
  
  gsap.to(windowEl, {
    opacity: 1,
    scale: 1,
    duration: 0.4,
    ease: 'power3.out'
  });
  
  makeDraggable(windowEl);
  windowEl.addEventListener('mousedown', function() { focusWindow(id); });
  updateDockIndicator(id, true);
  
  if (isSystemApp) {
    setupSystemApp(id);
  }
}

function closeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  gsap.to(win.element, {
    opacity: 0,
    scale: 0.95,
    duration: 0.3,
    ease: 'power3.out',
    onComplete: function() {
      win.element.remove();
      windows.delete(id);
      minimizedWindows.delete(id);
    }
  });
  
  updateDockIndicator(id, false);
}

function minimizeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  minimizedWindows.add(id);
  
  gsap.to(win.element, {
    opacity: 0,
    scale: 0.8,
    duration: 0.3,
    ease: 'power3.out',
    onComplete: function() {
      win.element.style.display = 'none';
    }
  });
  
  updateDockIndicator(id, true);
}

function maximizeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  if (win.isMaximized) {
    // Restore
    if (win.originalRect) {
      win.element.style.left = win.originalRect.left;
      win.element.style.top = win.originalRect.top;
      win.element.style.width = win.originalRect.width;
      win.element.style.height = win.originalRect.height;
    }
    win.isMaximized = false;
  } else {
    // Maximize
    win.originalRect = {
      left: win.element.style.left,
      top: win.element.style.top,
      width: win.element.style.width,
      height: win.element.style.height
    };
    win.element.style.left = '10px';
    win.element.style.top = '38px';
    win.element.style.width = 'calc(100vw - 20px)';
    win.element.style.height = 'calc(100vh - 58px)';
    win.isMaximized = true;
  }
  focusWindow(id);
}

function focusWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  win.element.style.zIndex = ++zIndexCounter;
}

function makeDraggable(windowEl) {
  const header = windowEl.querySelector('.window-header');
  let isDragging = false;
  let startX, startY, startLeft, startTop;
  
  header.addEventListener('mousedown', function(e) {
    if (e.target.classList.contains('window-btn')) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = windowEl.offsetLeft;
    startTop = windowEl.offsetTop;
    windowEl.style.transition = 'none';
  });
  
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    windowEl.style.left = (startLeft + dx) + 'px';
    windowEl.style.top = (startTop + dy) + 'px';
  });
  
  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      windowEl.style.transition = '';
    }
  });
}

// ─── Dock ───
function initDock() {
  const dock = document.getElementById('dock');
  const dockItems = [];
  
  // Add system apps first
  const systemOrder = ['finder', 'mail', 'notes', 'camera', 'about'];
  systemOrder.forEach(function(key) {
    const app = systemApps[key];
    dockItems.push({ id: key, title: app.title, icon: app.icon, accent: app.accent, isSystem: true });
  });
  
  // Separator
  dock.innerHTML = dockItems.map(function(item) {
    return '<button class="dock-item" data-id="' + item.id + '" onclick="openApp(\'' + item.id + '\')">' +
      '<img src="' + item.icon + '" alt="' + item.title + '">' +
      '<div class="dock-tooltip">' + item.title + '</div>' +
      '<div class="dock-indicator"></div>' +
    '</button>';
  }).join('') + '<div class="dock-separator"></div>';
  
  // Add featured projects
  const featured = projects.slice(0, 4);
  featured.forEach(function(p, i) {
    const btn = document.createElement('button');
    btn.className = 'dock-item';
    btn.dataset.id = p.id;
    btn.innerHTML = '<img src="' + p.icon + '" alt="' + p.title + '"><div class="dock-tooltip">' + p.title + '</div><div class="dock-indicator"></div>';
    btn.onclick = function() { openApp(p.id); };
    dock.appendChild(btn);
    
    gsap.from(btn, {
      y: 20,
      opacity: 0,
      duration: 0.4,
      delay: 0.5 + (i * 0.05),
      ease: 'power3.out'
    });
  });
}

function updateDockIndicator(id, isActive) {
  const item = document.querySelector('.dock-item[data-id="' + id + '"]');
  if (item) {
    item.classList.toggle('active', isActive);
  }
}

  // Check if it's a project
  const project = projects.find(function(p) { return p.id === id; });
  if (project) {

    return;
  }
  
  // Check if it's a system app
  const sysApp = systemApps[id];
  if (sysApp) {
    createWindow(id, sysApp, { isSystemApp: true, width: id === 'about' ? '400px' : '600px' });
    return;
  }
}

// ─── Camera App Functions ───
let cameraStream = null;

function initCamera() {
  const video = document.getElementById('camera-video');
  const placeholder = document.getElementById('camera-placeholder');
  
  if (!video || !placeholder) return;
  
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream) {
      cameraStream = stream;
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
    })
    .catch(function() {
      // Keep bear placeholder on error
    });
}

function takePhoto() {
  const video = document.getElementById('camera-video');
  const preview = document.getElementById('camera-preview');
  const previewImg = document.getElementById('camera-preview-img');
  
  if (video && video.style.display !== 'none') {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    previewImg.src = canvas.toDataURL('image/png');
  } else {
    // Bear mode - capture the bear
    previewImg.src = 'data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"200\"><text x=\"50%\" y=\"50%\" font-size=\"100\" text-anchor=\"middle\" dominant-baseline=\"middle\">🐻</text></svg>';
  }
  
  preview.style.display = 'block';
}

let keyBuffer = '';
document.addEventListener('keydown', function(e) {
  keyBuffer += e.key.toLowerCase();
  if (keyBuffer.length > 10) keyBuffer = keyBuffer.slice(-10);
  
  if (keyBuffer.includes('hello')) {
    showNotification('👋 Hello there!');
    keyBuffer = '';
  }
});

function showNotification(text) {
  const notif = document.getElementById('notification');
  notif.textContent = text;
  notif.classList.add('show');
  setTimeout(function() {
    notif.classList.remove('show');
  }, 3000);
}

// ─── Todo Widget ───
function getTodos() {
  try { return JSON.parse(localStorage.getItem('saberos-todos') || '[]'); } catch(e) { return []; }
}
function saveTodos(todos) { localStorage.setItem('saberos-todos', JSON.stringify(todos)); }
function renderTodos() {
  var todos = getTodos();
  var list = document.getElementById('todo-list');
  if (!todos.length) {
    list.innerHTML = '<li style="font-size:0.7rem;color:var(--fg-muted);opacity:0.6;">No tasks yet</li>';
    return;
  }
  list.innerHTML = todos.map(function(t, i) {
    return '<li class="todo-item' + (t.done ? ' done' : '') + '">' +
      '<button class="todo-check" onclick="toggleTodo(' + i + ')">' + (t.done ? '✓' : '') + '</button>' +
      '<span class="todo-text">' + t.text.replace(/</g,'&lt;') + '</span>' +
      '<button class="todo-remove" onclick="removeTodo(' + i + ')">✕</button>' +
      '</li>';
  }).join('');
}
function toggleTodoInput() {
  var row = document.getElementById('todo-input-row');
  row.classList.toggle('visible');
  if (row.classList.contains('visible')) document.getElementById('todo-input').focus();
}
function addTodo() {
  var input = document.getElementById('todo-input');
  var text = input.value.trim();
  if (!text) return;
  var todos = getTodos();
  todos.push({ text: text, done: false });
  saveTodos(todos);
  input.value = '';
  renderTodos();
}
function toggleTodo(i) {
  var todos = getTodos();
  if (todos[i]) todos[i].done = !todos[i].done;
  saveTodos(todos);
  renderTodos();
}
function removeTodo(i) {
  var todos = getTodos();
  todos.splice(i, 1);
  saveTodos(todos);
  renderTodos();
}

// ─── Weather Widget ───
var weatherEmojis = {'Clear':'☀️','Sunny':'☀️','Partly cloudy':'⛅','Cloudy':'☁️','Overcast':'☁️','Mist':'🌫️','Fog':'🌫️','Rain':'🌧️','Light rain':'🌦️','Heavy rain':'🌧️','Thunderstorm':'⛈️','Snow':'🌨️','Drizzle':'🌦️'};

function initWeather() {
  fetch('https://wttr.in/Beijing?format=j1')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var cur = d.current_condition[0];
      var temp = cur.temp_C;
      var desc = cur.weatherDesc[0].value;
      var emoji = weatherEmojis[desc] || '🌤️';
      document.getElementById('weather-temp').textContent = temp + '°C';
      document.getElementById('weather-desc').textContent = desc;
      document.getElementById('weather-icon').textContent = emoji;
    })
    .catch(function() {
      document.getElementById('weather-desc').textContent = 'Offline';
    });
}

// ─── Boot Animation ───
window.addEventListener('load', function() {
  initDock();
  initDesktopIcons();
  initLaunchpad();
  initMobileGrid();
  initWeather();
  renderTodos();

  setTimeout(function() {
    document.getElementById('boot-screen').classList.add('fade-out');
    setTimeout(function() {
      document.getElementById('boot-screen').style.display = 'none';
      // Init liquidGL after boot is fully gone and dock is rendered
      setTimeout(function() {
        if (typeof liquidGL === 'function') {
          liquidGL({
            snapshot: 'body',
            target: '.liquidGL-target',
            resolution: 2.0,
            refraction: 0.012,
            bevelDepth: 0.06,
            bevelWidth: 0.12,
            frost: 4,
            shadow: true,
            specular: true,
            reveal: 'fade',
            tilt: false,
            magnify: 1
          });
        }
      }, 300);
    }, 600);
  }, 1500);
});

// ─── Mobile Menu Toggle ───
function toggleMobileMenu() {
  showNotification('📱 Mobile menu coming soon');
}
