<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F5F0EB;
  --fg: #25533F;
  --fg-muted: #5C7A6E;
  
  /* Color Palette */
  --tea-green: #AACC96;
  --forest: #25533F;
  --peach-frost: #F4BEAE;
  --blueberry: #52A5CE;
  --bubblegum: #FF7BAC;
  --dry-earth: #876029;
  --grape-juice: #6D1F42;
  --lilacs: #D3B6D3;
  --butter-yellow: #EFCE7B;
  --iced-blue: #B8CEE8;
  --blood-orange: #EF6F3C;
  --olive-green: #AFAB23;
  
  --sans: 'Bricolage Grotesque', -apple-system, sans-serif;
  --serif: 'PT Serif', Georgia, serif;
  
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
}

html { font-size: 16px; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--fg);
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Desktop Wallpaper ─── */
.desktop {
  position: fixed;
  inset: 0;
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(170, 204, 150, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(244, 190, 174, 0.12) 0%, transparent 45%),
    radial-gradient(circle at 60% 20%, rgba(184, 206, 232, 0.1) 0%, transparent 40%),
    radial-gradient(circle at 30% 80%, rgba(239, 206, 123, 0.08) 0%, transparent 35%);
  z-index: 1;
}

/* ─── Windows ─── */
.window {
  position: absolute;
  min-width: 320px;
  min-height: 200px;
  max-width: 90vw;
  max-height: 85vh;
  background: var(--bg);
  border-radius: 8px;
  box-shadow: 
    0 4px 24px rgba(37, 83, 63, 0.12),
    0 16px 48px rgba(37, 83, 63, 0.08);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
  z-index: 100;
  overflow: hidden;
}

.window.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

.window-header {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
}

.window-header:active {
  cursor: grabbing;
}

.window-close {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: transparent;
  transition: all 0.2s var(--ease-out-quart);
  flex-shrink: 0;
}

.window-close:hover {
  background: rgba(255, 255, 255, 1);
  color: var(--fg);
}

.window-title {
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.95);
  flex: 1;
  text-align: center;
  letter-spacing: 0.02em;
}

.window-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.window-content img {
  width: 100%;
  height: auto;
  border-radius: 4px;
  margin-bottom: 20px;
}

.window-content h2 {
  font-family: var(--sans);
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--fg);
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

.window-content p {
  font-family: var(--serif);
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--fg-muted);
  margin-bottom: 16px;
}

.window-content a {
  color: var(--forest);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.window-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg);
  background: transparent;
  border: 1px solid var(--forest);
  padding: 10px 20px;
  border-radius: 100px;
  text-decoration: none;
  margin-top: 8px;
  transition: all 0.2s var(--ease-out-quart);
}

.window-link:hover {
  background: var(--forest);
  color: var(--bg);
}

.window-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(37, 83, 63, 0.1);
}

.window-tags span {
  font-family: var(--sans);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-muted);
  padding: 4px 12px;
  background: rgba(37, 83, 63, 0.06);
  border-radius: 100px;
}

.window-resize {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 16px;
  height: 16px;
  cursor: nwse-resize;
  background: linear-gradient(135deg, transparent 50%, rgba(37, 83, 63, 0.2) 50%);
  border-bottom-right-radius: 8px;
}

/* ─── Dock ─── */
.dock {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--forest);
  padding: 12px 20px;
  border-radius: 100px;
  display: flex;
  gap: 8px;
  align-items: center;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(37, 83, 63, 0.25);
}

.dock-separator {
  width: 1px;
  height: 32px;
  background: rgba(255, 255, 255, 0.15);
  margin: 0 4px;
}

.dock-item {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  position: relative;
  transition: background 0.2s var(--ease-out-quart);
  flex-shrink: 0;
}

.dock-item:hover {
  background: rgba(255, 255, 255, 0.18);
}

.dock-item img {
  width: 28px;
  height: 28px;
  object-fit: contain;
  pointer-events: none;
}

.dock-item span {
  font-size: 0.55rem;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.03em;
  max-width: 44px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dock-tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: rgba(37, 83, 63, 0.9);
  backdrop-filter: blur(8px);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s var(--ease-out-quart), transform 0.2s var(--ease-out-quart);
}

.dock-item:hover .dock-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(-4px);
}

.dock-indicator {
  position: absolute;
  bottom: 4px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  opacity: 0;
  transition: opacity 0.2s;
}

.dock-item.active .dock-indicator {
  opacity: 1;
}

/* ─── Top Navigation (Mobile) ─── */
.top-nav {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: rgba(245, 240, 235, 0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 300;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(37, 83, 63, 0.08);
}

.top-nav-name {
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg);
}

/* ─── Mobile Home Grid ─── */
.mobile-home {
  display: none;
  position: fixed;
  inset: 56px 0 0;
  z-index: 100;
  padding: 24px 20px;
  overflow-y: auto;
}

.app-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px 16px;
  max-width: 400px;
  margin: 0 auto;
}

.app-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px;
  border-radius: 16px;
  transition: transform 0.2s var(--ease-out-quart);
}

.app-icon:active {
  transform: scale(0.95);
}

.app-icon-img {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  background: var(--forest);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(37, 83, 63, 0.15);
}

.app-icon-img img {
  width: 36px;
  height: 36px;
  object-fit: contain;
}

.app-icon span {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--fg);
  text-align: center;
  max-width: 72px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── Mobile Sheet ─── */
.mobile-sheet {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 400;
  background: var(--bg);
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s var(--ease-out-quart);
}

.mobile-sheet.active {
  transform: translateY(0);
}

.mobile-sheet-header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  border-bottom: 1px solid rgba(37, 83, 63, 0.1);
}

.mobile-sheet-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(37, 83, 63, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--fg);
  cursor: pointer;
}

.mobile-sheet-title {
  flex: 1;
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 500;
  color: var(--fg);
  text-align: center;
  margin-right: 32px;
}

.mobile-sheet-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.mobile-sheet-content img {
  width: 100%;
  height: auto;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* ─── Tablet Layout ─── */
@media (min-width: 768px) and (max-width: 1023px) {
  .dock {
    bottom: 20px;
    padding: 10px 16px;
  }
  
  .dock-item {
    width: 48px;
    height: 48px;
  }
  
  .dock-item img {
    width: 24px;
    height: 24px;
  }
  
  .window {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: 90vw !important;
    max-width: 600px;
    max-height: 80vh;
  }
}

/* ─── Mobile Layout ─── */
@media (max-width: 767px) {
  .dock {
    display: none;
  }
  
  .top-nav {
    display: flex;
  }
  
  .mobile-home {
    display: block;
  }
  
  .mobile-sheet {
    display: flex;
  }
  
  .window {
    display: none !important;
  }
  
  .desktop {
    background: var(--bg);
  }
}

/* ─── Reduced Motion ─── */
@media (prefers-reduced-motion: reduce) {
  .window {
    transition: opacity 0.2s ease;
    transform: none;
  }
  
  .mobile-sheet {
    transition: opacity 0.2s ease;
    transform: none;
    opacity: 0;
    pointer-events: none;
  }
  
  .mobile-sheet.active {
    opacity: 1;
    pointer-events: auto;
  }
}

/* ─── About Window Special ─── */
.about-content strong {
  color: var(--fg);
  font-weight: 500;
}

.about-links {
  display: flex;
  gap: 16px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid rgba(37, 83, 63, 0.1);
}

.about-links a {
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.about-links a:hover {
  color: var(--fg);
}

/* ─── Agent Chat Window ─── */
.chat-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.chat-placeholder img {
  width: 80px;
  height: 80px;
  margin-bottom: 20px;
}

.chat-placeholder p {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--fg-muted);
  max-width: 280px;
}
</style>

// ─── Window Management ───
const windows = new Map();
let zIndexCounter = 100;
let activeWindowId = null;

function createWindow(id, data, isProject = true) {
  // If window already exists, just focus it
  if (windows.has(id)) {
    focusWindow(id);
    return;
  }

  const windowEl = document.createElement('div');
  windowEl.className = 'window';
  windowEl.id = `window-${id}`;
  windowEl.style.zIndex = ++zIndexCounter;
  
  // Random position for staggered appearance
  const randomX = 80 + Math.random() * 100;
  const randomY = 60 + Math.random() * 80;
  windowEl.style.left = `${randomX}px`;
  windowEl.style.top = `${randomY}px`;
  windowEl.style.width = '420px';
  
  const headerColor = data.accent || '#25533F';
  
  let contentHTML = '';
  if (isProject) {
    contentHTML = `
      <img src="${data.image}" alt="${data.title}" loading="lazy">
      <h2>${data.title}</h2>
      <p>${data.detail}</p>
      <a class="window-link" href="${data.link}" target="_blank">View Project →</a>
      <div class="window-tags">
        ${data.tags.map(t => `<span>${t}</span>`).join('')}
      </div>
    `;
  } else {
    contentHTML = data.content;
  }
  
  windowEl.innerHTML = `
    <div class="window-header" style="background: ${headerColor}">
      <button class="window-close" onclick="closeWindow('${id}')">×</button>
      <span class="window-title">${data.title}</span>
    </div>
    <div class="window-content ${id === 'about' ? 'about-content' : ''}">
      ${contentHTML}
    </div>
    <div class="window-resize"></div>
  `;
  
  document.getElementById('desktop').appendChild(windowEl);
  
  // Store window data
  windows.set(id, {
    element: windowEl,
    data: data,
    isOpen: true
  });
  
  // Animate in
  gsap.to(windowEl, {
    opacity: 1,
    scale: 1,
    duration: 0.4,
    ease: 'power3.out'
  });
  
  // Make draggable
  makeDraggable(windowEl);
  
  // Make resizable
  makeResizable(windowEl);
  
  // Focus on click
  windowEl.addEventListener('mousedown', () => focusWindow(id));
  
  // Update dock indicator
  updateDockIndicator(id, true);
  
  activeWindowId = id;
}

function closeWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  gsap.to(win.element, {
    opacity: 0,
    scale: 0.95,
    duration: 0.3,
    ease: 'power3.out',
    onComplete: () => {
      win.element.remove();
      windows.delete(id);
    }
  });
  
  updateDockIndicator(id, false);
}

function focusWindow(id) {
  const win = windows.get(id);
  if (!win) return;
  
  win.element.style.zIndex = ++zIndexCounter;
  activeWindowId = id;
}

function makeDraggable(windowEl) {
  const header = windowEl.querySelector('.window-header');
  let isDragging = false;
  let startX, startY, startLeft, startTop;
  
  header.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('window-close')) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = windowEl.offsetLeft;
    startTop = windowEl.offsetTop;
    windowEl.style.transition = 'none';
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    windowEl.style.left = `${startLeft + dx}px`;
    windowEl.style.top = `${startTop + dy}px`;
  });
  
  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      windowEl.style.transition = '';
    }
  });
}

function makeResizable(windowEl) {
  const handle = windowEl.querySelector('.window-resize');
  let isResizing = false;
  let startX, startY, startWidth, startHeight;
  
  handle.addEventListener('mousedown', (e) => {
    isResizing = true;
    startX = e.clientX;
    startY = e.clientY;
    startWidth = windowEl.offsetWidth;
    startHeight = windowEl.offsetHeight;
    e.preventDefault();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    windowEl.style.width = `${Math.max(320, startWidth + dx)}px`;
    windowEl.style.height = `${Math.max(200, startHeight + dy)}px`;
  });
  
  document.addEventListener('mouseup', () => {
    isResizing = false;
  });
}

// ─── Dock ───
function initDock() {
  const dock = document.getElementById('dock');
  
  // Project items
  projects.forEach((p, i) => {
    const item = document.createElement('button');
    item.className = 'dock-item';
    item.dataset.id = p.id;
    item.innerHTML = `
      <img src="${p.emoji}" alt="${p.title}">
      <div class="dock-tooltip">${p.title}</div>
      <div class="dock-indicator"></div>
    `;
    
    // GSAP hover animation
    item.addEventListener('mouseenter', () => {
      gsap.to(item.querySelector('img'), {
        scale: 1.2,
        duration: 0.3,
        ease: 'power3.out'
      });
    });
    
    item.addEventListener('mouseleave', () => {
      gsap.to(item.querySelector('img'), {
        scale: 1,
        duration: 0.3,
        ease: 'power3.out'
      });
    });
    
    item.addEventListener('click', () => {
      createWindow(p.id, p, true);
    });
    
    dock.appendChild(item);
    
    // Stagger animation on load
    gsap.from(item, {
      y: 20,
      opacity: 0,
      duration: 0.4,
      delay: 0.5 + (i * 0.05),
      ease: 'power3.out'
    });
  });
  
  // Separator
  const sep = document.createElement('div');
  sep.className = 'dock-separator';
  dock.appendChild(sep);
  
  // About item
  const aboutItem = document.createElement('button');
  aboutItem.className = 'dock-item';
  aboutItem.dataset.id = 'about';
  aboutItem.innerHTML = `
    <img src="${aboutData.emoji}" alt="About">
    <div class="dock-tooltip">About</div>
    <div class="dock-indicator"></div>
  `;
  
  aboutItem.addEventListener('mouseenter', () => {
    gsap.to(aboutItem.querySelector('img'), {
      scale: 1.2,
      duration: 0.3,
      ease: 'power3.out'
    });
  });
  
  aboutItem.addEventListener('mouseleave', () => {
    gsap.to(aboutItem.querySelector('img'), {
      scale: 1,
      duration: 0.3,
      ease: 'power3.out'
    });
  });
  
  aboutItem.addEventListener('click', () => {
    createWindow('about', aboutData, false);
  });
  
  dock.appendChild(aboutItem);
  
  gsap.from(aboutItem, {
    y: 20,
    opacity: 0,
    duration: 0.4,
    delay: 0.5 + (projects.length * 0.05),
    ease: 'power3.out'
  });
  
  // Chat item
  const chatItem = document.createElement('button');
  chatItem.className = 'dock-item';
  chatItem.dataset.id = 'agent-chat';
  chatItem.innerHTML = `
    <img src="${chatData.emoji}" alt="Chat">
    <div class="dock-tooltip">Agent Chat</div>
    <div class="dock-indicator"></div>
  `;
  
  chatItem.addEventListener('mouseenter', () => {
    gsap.to(chatItem.querySelector('img'), {
      scale: 1.2,
      duration: 0.3,
      ease: 'power3.out'
    });
  });
  
  chatItem.addEventListener('mouseleave', () => {
    gsap.to(chatItem.querySelector('img'), {
      scale: 1,
      duration: 0.3,
      ease: 'power3.out'
    });
  });
  
  chatItem.addEventListener('click', () => {
    createWindow('agent-chat', chatData, false);
  });
  
  dock.appendChild(chatItem);
  
  gsap.from(chatItem, {
    y: 20,
    opacity: 0,
    duration: 0.4,
    delay: 0.5 + ((projects.length + 1) * 0.05),
    ease: 'power3.out'
  });
}

function updateDockIndicator(id, isActive) {
  const item = document.querySelector(`.dock-item[data-id="${id}"]`);
  if (item) {
    item.classList.toggle('active', isActive);
  }
}

// ─── Mobile Grid ───
function initMobileGrid() {
  const grid = document.getElementById('app-grid');
  
  // Projects
  projects.forEach(p => {
    const icon = document.createElement('div');
    icon.className = 'app-icon';
    icon.innerHTML = `
      <div class="app-icon-img" style="background: ${p.accent}">
        <img src="${p.emoji}" alt="${p.title}">
      </div>
      <span>${p.title}</span>
    `;
    icon.addEventListener('click', () => openMobileSheet(p, true));
    grid.appendChild(icon);
  });
  
  // About
  const aboutIcon = document.createElement('div');
  aboutIcon.className = 'app-icon';
  aboutIcon.innerHTML = `
    <div class="app-icon-img" style="background: ${aboutData.accent}">
      <img src="${aboutData.emoji}" alt="About">
    </div>
    <span>About</span>
  `;
  aboutIcon.addEventListener('click', () => openMobileSheet(aboutData, false));
  grid.appendChild(aboutIcon);
  
  // Chat
  const chatIcon = document.createElement('div');
  chatIcon.className = 'app-icon';
  chatIcon.innerHTML = `
    <div class="app-icon-img" style="background: ${chatData.accent}">
      <img src="${chatData.emoji}" alt="Chat">
    </div>
    <span>Agent Chat</span>
  `;
  chatIcon.addEventListener('click', () => openMobileSheet(chatData, false));
  grid.appendChild(chatIcon);
}

// ─── Mobile Sheet ───
function openMobileSheet(data, isProject = true) {
  const sheet = document.getElementById('mobile-sheet');
  const header = document.getElementById('mobile-sheet-header');
  const title = document.getElementById('mobile-sheet-title');
  const content = document.getElementById('mobile-sheet-content');
  
  header.style.background = data.accent || '#25533F';
  title.textContent = data.title;
  title.style.color = 'white';
  
  let contentHTML = '';
  if (isProject) {
    contentHTML = `
      <img src="${data.image}" alt="${data.title}">
      <h2 style="font-family: var(--sans); font-size: 1.5rem; font-weight: 400; margin-bottom: 16px; color: var(--fg);">${data.title}</h2>
      <p style="font-family: var(--serif); font-size: 1rem; line-height: 1.7; color: var(--fg-muted); margin-bottom: 16px;">${data.detail}</p>
      <a href="${data.link}" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; font-family: var(--sans); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--fg); border: 1px solid var(--forest); padding: 12px 24px; border-radius: 100px; text-decoration: none;">View Project →</a>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px;">
        ${data.tags.map(t => `<span style="font-size: 0.65rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); padding: 4px 12px; background: rgba(37, 83, 63, 0.06); border-radius: 100px;">${t}</span>`).join('')}
      </div>
    `;
  } else {
    contentHTML = data.content;
  }
  
  content.innerHTML = contentHTML;
  sheet.classList.add('active');
}

function closeMobileSheet() {
  document.getElementById('mobile-sheet').classList.remove('active');
}

// ─── Initialization ───
document.addEventListener('DOMContentLoaded', () => {
  initDock();
  initMobileGrid();
});
</script>
